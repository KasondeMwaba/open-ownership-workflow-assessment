services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://workflow:workflow@postgres:5432/workflow?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-this-for-production
      CORS_ORIGIN: http://localhost:5173
      SEED_REQUESTER_NAME: ${SEED_REQUESTER_NAME:-Amina Requester}
      SEED_REQUESTER_EMAIL: ${SEED_REQUESTER_EMAIL:-requester@example.com}
      SEED_REQUESTER_PASSWORD: ${SEED_REQUESTER_PASSWORD:-password}
      SEED_REVIEWER_NAME: ${SEED_REVIEWER_NAME:-Noah Reviewer}
      SEED_REVIEWER_EMAIL: ${SEED_REVIEWER_EMAIL:-reviewer@example.com}
      SEED_REVIEWER_PASSWORD: ${SEED_REVIEWER_PASSWORD:-password}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Sam Admin}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-password}
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:18080
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
