services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: workflow
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://workflow:workflow@postgres:5432/workflow?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-this-for-production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:18080
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
